syntax = "proto3";

package timetabling.v1;

// ===================================================================
// Main Request Message
// ===================================================================

message ProblemDefinition {
  string job_id = 1;
  SolverConfig config = 2;
  TimeGrid time_grid = 3;
  repeated Teacher teachers = 4;
  repeated StudentGroup student_groups = 5;
  repeated Activity activities = 6;
  repeated WorkloadConstraint workload_constraints = 7;
  repeated AdvancedWorkloadConstraint advanced_workload_constraints = 8;
  repeated SystemBreak system_breaks = 9;
  repeated TimePreference time_preferences = 10;
  int32 student_gap_penalty_per_day = 11;
  repeated ActivityOrdering activity_orderings = 12;
  repeated ConsecutiveActivities consecutive_activities = 13;
  repeated MinDaysBetweenActivities min_days_between_activities = 14;
}

// ===================================================================
// Configuration
// ===================================================================

message SolverConfig {
  // Maximum time in seconds the solver is allowed to run.
  float max_solve_time_seconds = 1;
}

message TimeGrid {
  // The total number of days in the scheduling period (e.g., 5 for Mon-Fri).
  int32 days = 1;
  // The number of time slots (e.g., hours) per day.
  int32 slots_per_day = 2;
}

// ===================================================================
// Core Entities
// ===================================================================

message Teacher {
  string id = 1;
  string name = 2;

  // A list of times when this teacher is explicitly NOT available.
  // This is a hard constraint.
  repeated TimeSlot unavailable_slots = 3;
}

message StudentGroup {
  string id = 1;
  string name = 2;
}

message Activity {
  string id = 1;
  string name = 2;

  // The ID of the teacher assigned to this activity.
  string teacher_id = 3;

  // The IDs of all student groups that must attend this activity.
  repeated string student_group_ids = 4;

  // The duration of the activity in number of time slots.
  // A standard 1-hour class would be 1. A 3-hour lab would be 3.
  int32 duration_in_slots = 5;

  // If true, this activity has been pre-placed by a user.
  // The solver must treat its `locked_start_time` as a fixed constraint.
  bool is_locked = 6;
  TimeSlot locked_start_time = 7;

  // New field required by preferences.py
  string time_preference_id = 8;
}

// ===================================================================
// Shared Structures
// ===================================================================

// Represents a single point in the timetable grid.
message TimeSlot {
  // The day index, 0-based (e.g., 0=Monday, 1=Tuesday).
  int32 day_index = 1;
  // The slot index within the day, 0-based (e.g., 0=9am, 1=10am).
  int32 slot_index = 2;
}

// ===================================================================
// Constraint Definitions
// ===================================================================

message WorkloadConstraint {
  // The ID of the teacher this constraint applies to.
  // If empty, it could apply to all teachers (future enhancement).
  string teacher_id = 1;

  // — Soft Constraint: Max Gaps Per Day ---
  // The maximum number of idle slots between the first and last activity of a day.
  int32 max_gaps_per_day = 2;
  // The penalty added to the objective for each gap over the maximum.
  int32 penalty_per_gap = 3;

  // — Hard Constraint: Max Hours Per Day ---
  // The absolute maximum number of hours (slots) a teacher can work in a single day.
  int32 max_hours_per_day = 4;
}

message AdvancedWorkloadConstraint {
  string teacher_id = 1;
  int32 max_hours_per_week = 2;
  int32 max_days_per_week = 3;
}

message SystemBreak {
  string id = 1;
  int32 start_day = 2;
  int32 end_day = 3;
}

message TimePreference {
  string id = 1;
  repeated TimeSlot preferred_slots = 2;
  int32 penalty_per_violation = 3;
}

message ActivityOrdering {
  string before_activity_id = 1;
  string after_activity_id = 2;
}

message ConsecutiveActivities {
  string first_activity_id = 1;
  string second_activity_id = 2;
}

message MinDaysBetweenActivities {
  string first_activity_id = 1;
  string second_activity_id = 2;
  int32 minimum_days = 3;
}
